controls=new THREE.OrbitControls(camera,renderer.domElement);

ground.rotation.x=-Math.PI/2;ground.position.y=-1.2;ground.receiveShadow=true;scene.add(ground);

function rSize(){var v=document.getElementById('cv'),w=v.clientWidth,h=v.clientHeight;

function mMat(cl,tr,em,seg){return new THREE.MeshPhysicalMaterial({color:parseInt(cl.replace('#',''),16),transparent:!!tr,opacity:tr||1,emissive:new THREE.Color(em||cl),emissiveIntensity:em?0.2:0.05,roughness:seg?0.28:0.3,metalness:0.05,envMapIntensity:0.4,clearcoat:seg?0.3:0,clearcoatRoughness:0.4})}
function mS(r,cl,tr,sg){var s=sg||48;return new THREE.Mesh(new THREE.SphereGeometry(r,s,s),mMat(cl,tr,0,1))}
function mT(r,t,cl,tr){return new THREE.Mesh(new THREE.TorusGeometry(r,t,16,32),mMat(cl,tr))}
function mC(r1,r2,h,cl,tr){return new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,16),mMat(cl,tr))}
function mK(p,cl,tr,r){r=r||0.04;var c=new THREE.CatmullRomCurve3(p);return new THREE.Mesh(new THREE.TubeGeometry(c,32,r,12,false),mMat(cl,tr))}
function mCaps(r,h,cl,tr){var g=new THREE.SphereGeometry(r,24,24);g.scale(1,1+h/r,1);return new THREE.Mesh(g,mMat(cl,tr))}
function mBox(w,h,d,cl,tr){return new THREE.Mesh(new THREE.BoxGeometry(w,h,d,1,1,1),mMat(cl,tr))}
function mNuc(r,cl){var g=new THREE.Group();g.add(mS(r,cl,0.3,48));var nuc=new THREE.Mesh(new THREE.SphereGeometry(r*0.35,24,24),mMat('#B56AD8',0.2,1,1));nuc.position.set(r*0.3,r*0.25,r*0.3);g.add(nuc);return g}
function lbl(txt,color){var d=document.createElement('div');d.className='lbl';d.textContent=txt;if(color)d.style.borderColor=color;return new THREE.CSS2DObject(d)}
function detLbl(txt,sub){var d=document.createElement('div');d.className='lbl';d.innerHTML=txt+' <span class="lbl-det">'+sub+'</span>';return new THREE.CSS2DObject(d)}
function buildNeuron(){var g=new THREE.Group();var b=mS(1.0,'#7B68AE',0.08,48);b.userData={o:'mem'};g.add(b);
var nuc=mNuc(0.35,'#7B68AE');nuc.position.set(-0.1,0,0);nuc.userData={o:'nucleus'};g.add(nuc);
var axPts=[];for(var i=0;i<10;i++)axPts.push(new THREE.Vector3(0,0,0));
axPts.push(new THREE.Vector3(1.2,0.1,0));axPts.push(new THREE.Vector3(1.8,-0.1,0.05));
var axon=mK(axPts,'#7B68AE',0.1,0.06);axon.userData={o:'axon'};g.add(axon);
for(var i=0;i<8;i++){var a=i*Math.PI*2/8;var p=[];p.push(new THREE.Vector3(0,0,0));
for(var j=1;j<6;j++){var t=j/6;p.push(new THREE.Vector3(Math.cos(a)*t*1.6+Math.sin(a*3+j)*0.12,Math.sin(a)*t*1.6+Math.cos(a*2+j)*0.12,Math.sin(j*1.5)*0.12))}
var d=mK(p,'#7B68AE',0.12,0.045);d.userData={o:'dendrite'};g.add(d)}
for(var i=0;i<3;i++){var mt=mCaps(0.05,0.15,'#D4845A',0.5);mt.position.set(0.3+i*0.15,0.2+i*0.1,0.15+i*0.05);mt.rotation.set(Math.random(),Math.random(),Math.random());mt.userData={o:'mitochondria'};g.add(mt)}
for(var i=0;i<4;i++){var ls=mS(0.04,'#D4845A',0.4);ls.position.set(-0.3+Math.random()*0.3,-0.15+Math.random()*0.3,0.2+Math.random()*0.2);ls.userData={o:'lysosome'};g.add(ls)}
var gol=new THREE.Mesh(new THREE.TorusGeometry(0.1,0.025,16,32),mMat('#5A9E6F',0.3));gol.position.set(0.15,-0.2,0.2);gol.rotation.x=Math.PI/4;gol.userData={o:'golgi'};g.add(gol);

function buildCell(type){if(cellGrp&&scene){scene.remove(cellGrp)}
cellGrp=new THREE.Group();var b={neuron:buildNeuron,plant:buildPlant,wbc:buildWBC,bac:buildBac,animal:buildAnimal,muscle:buildMuscle,epi:buildEpi,rb:buildRB}[type];
if(b){var m=b();cellGrp.add(m)}if(scene)scene.add(cellGrp)}

function render(){
document.getElementById('cl').innerHTML=CT.map(function(x){return '<div class="ci'+(x.id===curCell?' a':'')+'" onclick="sel(\''+x.id+'\')"><div class="cii" style="background:'+x.bg+'"></div><div class="cin"><div class="cinm">'+x.nm+'</div><div class="cid">'+x.ds+'</div></div></div>';}).join('');
var ct=CT.find(function(x){return x.id===curCell});document.getElementById('vtt').textContent=ct.nm;
ud();renderAll();
if(!glbLoaded)buildCell(curCell);}

function sel(id){
curCell=id;selOrg=null;mode='mesh';
document.querySelectorAll('#ms button').forEach(function(b){b.classList.remove('a')});
document.getElementById('ms').children[0].classList.add('a');
// If a preloaded GLB exists for this cell type, load it
if(window._GLB_CACHE && window._GLB_CACHE[id]){
  loadPreloadedGLB(id);
  render();
  return;
}
// If no GLB for this cell type, reset to code-generated model
if(glbLoaded){
  // Properly remove old GLB model from scene
  if(cellGrp && scene){
    scene.remove(cellGrp);
  }
  glbLoaded=false;
  cellGrp=null;
  document.getElementById('gbi').classList.remove('show');
}
render();}

function ud(){var o=ORG[curCell]||ORG.neuron;var item=selOrg?o.find(function(x){return x.id===selOrg}):o[0];
if(!item){document.getElementById('od').innerHTML='<div style="color:var(--t3);font-size:12px;padding:10px">Select an organelle</div>';return}
document.getElementById('od').innerHTML='<div class="ohh"><div class="ohii" style="background:'+item.cl+'22"></div><div><div class="ohnn">'+item.nm+'</div><div class="ohdd">'+item.ds+'</div></div></div>';
document.getElementById('bns').innerHTML='Selected: '+item.nm+'<div class="nhh">Click the organelle in 3D view or select from list above.</div>'}

function pMove(e){var r=renderer.domElement.getBoundingClientRect();
ptr.x=((e.clientX-r.left)/r.width)*2-1;ptr.y=-((e.clientY-r.top)/r.height)*2+1;
rc.setFromCamera(ptr,camera);var o=cellGrp?rc.intersectObjects(cellGrp.children,true):[];
if(o.length&&o[0].object.userData.o){var obj=o[0].object;
if(hoverObj&&hoverObj!==obj){hOv(hoverObj,false)}
hOv(obj,true);hoverObj=obj;renderer.domElement.style.cursor='pointer'}
else{if(hoverObj){hOv(hoverObj,false);hoverObj=null;renderer.domElement.style.cursor='default'}
hOv(null,false)}lblRenderer.render(scene,camera)}

function pDown(e){if(!hoverObj||!hoverObj.userData.o)return
selOrg=hoverObj.userData.o;render();fcView()}

function hOv(obj,on){if(!obj||!obj.material)return
if(on){obj.material.emissiveIntensity=0.5;showLbl(obj)}else{obj.material.emissiveIntensity=obj.userData._eI||0.05;hideLbl(obj)}}

function showLbl(obj){var o=findOrg(obj.userData.o);if(!o)return
var l=lbl(o.nm);l.position.copy(obj.position);l.userData={for:obj.uuid};cellGrp.add(l)}

function hideLbl(obj){if(!cellGrp)return;cellGrp.children.forEach(function(c){if(c.isCSS2DObject&&c.userData.for===obj.uuid)cellGrp.remove(c)})}

function findOrg(id){if(!id)return null;var o=ORG[curCell]||ORG.neuron;return o.find(function(x){return x.id===id})}

function fcView(){if(mode!=='mesh')return
if(!hoverObj||!hoverObj.userData.o)return
selOrg=hoverObj.userData.o;mode='focus';
var b=document.querySelectorAll('#ms button');b[0].classList.remove('a');b[1].classList.add('a');
var pos=new THREE.Vector3();hoverObj.getWorldPosition(pos);
controls.target.copy(pos);
if(cellGrp){
var selId=hoverObj.userData.o;
cellGrp.traverse(function(obj){
if(obj.isMesh){
var oid=obj.userData.o;
if(oid===selId){
obj.material.emissiveIntensity=0.6;obj.material.opacity=Math.min(obj.material.opacity*1.3,1);obj.scale.setScalar(1.15);
}else{
obj.material.opacity=0.15;obj.material.emissiveIntensity=0;
}
}});}
var targetPos=new THREE.Vector3(pos.x+1.5,pos.y+1.5,pos.z+1.5);
fcAnim(camera.position.clone(),targetPos,controls.target.clone(),700);ud()}

function fcAnim(from,to,ta,dur){var s=Date.now();
function step(){var t=Math.min((Date.now()-s)/dur,1);
var e=t<0.5?2*t*t:-1+(4-2*t)*t;
camera.position.lerpVectors(from,to,e);controls.target.copy(ta);
if(t<1)requestAnimationFrame(step)}step()}

function exitFC(){mode='mesh';selOrg=null;
var b=document.querySelectorAll('#ms button');b[1].classList.remove('a');b[0].classList.add('a');
if(cellGrp){
cellGrp.traverse(function(obj){
if(obj.isMesh){obj.material.opacity=0.08;obj.material.emissiveIntensity=0.05;obj.scale.setScalar(1);}
});
cellGrp.children[0].traverse(function(obj){
if(obj.isMesh){obj.material.opacity=0.08;obj.material.emissiveIntensity=0.05;obj.scale.setScalar(1);}
});}
fcAnim(camera.position.clone(),new THREE.Vector3(4,3,8),new THREE.Vector3(0,0,0),600);renderAll();}

document.addEventListener('keydown',function(e){if(e.key==='Escape'&&mode==='focus')exitFC()});


function swM(m){if(m==='focus'&&selOrg)fcView();else if(m==='mesh')exitFC()}

// GLB Import System
var glbLoader=null,glbLoaded=false,glbFile=null;

function tIP(){var p=document.getElementById('mip');p.classList.toggle('show')}

function hGI(input){if(!input.files||!input.files[0])return;
var file=input.files[0];if(!file.name.match(/\.(glb|gltf)$/i)){sS('err','Only .glb and .gltf files supported');return}
glbFile=file;sS('ok','Loading '+file.name+'...');loadGLB(file)}

function loadGLB(file){
if(!glbLoader)glbLoader=new THREE.GLTFLoader();
var reader=new FileReader();
reader.onload=function(e){
glbLoader.parse(e.target.result,'',function(gltf){
if(cellGrp&&scene){scene.remove(cellGrp)}
var model=gltf.scene;
// Center and scale model
model.traverse(function(node){
if(node.isMesh){
node.castShadow=true;node.receiveShadow=true;
if(node.material){
node.material.transparent=node.material.transparent||false;
node.material.opacity=node.material.opacity||1;
node.material.emissiveIntensity=0.05;
}
node.userData.o='model_'+node.name;
}});
// Auto-center
var box=new THREE.Box3().setFromObject(model);
var center=box.getCenter(new THREE.Vector3());
var size=box.getSize(new THREE.Vector3());
var maxDim=Math.max(size.x,size.y,size.z);
var scale=2/maxDim;
model.scale.setScalar(scale);
model.position.sub(center.multiplyScalar(scale));
cellGrp=new THREE.Group();
cellGrp.add(model);
scene.add(cellGrp);
glbLoaded=true;
sS('ok','✓ Model loaded! '+file.name);
document.getElementById('gbi').classList.add('show');
document.getElementById('mir').style.display='block';
rSize();
},function(err){sS('err','Parse error: '+err.message)},
function(err){sS('err','Load error: '+err.message)})};
reader.readAsArrayBuffer(file)}

function rGI(){
glbLoaded=false;glbFile=null;
document.getElementById('mir').style.display='none';
document.getElementById('gbi').classList.remove('show');
sS('','');
if(cellGrp&&scene){scene.remove(cellGrp)}
cellGrp=null;
buildCell(curCell);
rSize()}

function sS(type,msg){
var el=document.getElementById('mis');
el.textContent=msg;el.className='mi-status'+(type?' '+type:'')}

// Drag and drop support
(function(){
var drop=document.getElementById('mid');
if(!drop)return;
drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('over')});
drop.addEventListener('dragleave',function(){drop.classList.remove('over')});
drop.addEventListener('drop',function(e){

// Preload all GLB models on startup
function preloadGLBs(){
  if(typeof THREE === 'undefined' || !THREE.GLTFLoader) return;
  var loader = new THREE.GLTFLoader();
  var loaded = 0;
  var total = Object.keys(GLB_MODELS).length;
  for(var key in GLB_MODELS){
    (function(k){
      loader.load(GLB_MODELS[k], function(gltf){
        window._GLB_CACHE = window._GLB_CACHE || {};
        window._GLB_CACHE[k] = gltf;
        loaded++;
        if(loaded === total){
          console.log("All " + total + " GLB models preloaded");
          // If no GLB was manually loaded, auto-load current cell's GLB
          if(!glbLoaded && GLB_MODELS[curCell]){
            loadPreloadedGLB(curCell);
          }
        }
      }, undefined, function(err){
        console.warn("Failed to preload GLB for " + k + ": " + err.message);
        loaded++;
      });
    })(key);
  }
}

// Load a preloaded GLB model for a cell type
function loadPreloadedGLB(cellId){
  if(!window._GLB_CACHE || !window._GLB_CACHE[cellId]){
    console.warn("GLB model not cached for " + cellId);
    return;
  }
  var gltf = window._GLB_CACHE[cellId];
  // Clean up any existing cell group
  if(cellGrp && scene){
    scene.remove(cellGrp);
  }
  // Also remove any stray groups that might be left over
  var toRemove = [];
  scene.children.forEach(function(child){
    if(child.isGroup && child !== cellGrp){
      toRemove.push(child);
    }
  });
  toRemove.forEach(function(g){scene.remove(g)});
  
  var model = gltf.scene.clone();
  model.traverse(function(node){
    if(node.isMesh){
      node.castShadow = true;
      node.receiveShadow = true;
      if(node.material){
        node.material.transparent = node.material.transparent || false;
        node.material.opacity = node.material.opacity || 1;
        node.material.emissiveIntensity = 0.05;
      }
      node.userData.o = 'model_' + node.name;
    }
  });
  // Auto-center and scale
  var box = new THREE.Box3().setFromObject(model);
  var center = box.getCenter(new THREE.Vector3());
  var size = box.getSize(new THREE.Vector3());
  var maxDim = Math.max(size.x, size.y, size.z);
  var scale = 2.0 / maxDim;
  model.scale.setScalar(scale);
  model.position.sub(center.multiplyScalar(scale));
  cellGrp = new THREE.Group();
  cellGrp.add(model);
  scene.add(cellGrp);
  glbLoaded = true;
  console.log("Loaded preloaded GLB for " + cellId);
  document.getElementById('gbi').classList.add('show');
}

setTimeout(function(){init();render();animate();preloadGLBs();},50);

function drawMV(canvas,type,bg){
var ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
ctx.fillStyle=bg||'#F5EDE0';ctx.fillRect(0,0,w,h);
var cx=w/2,cy=h/2,r=Math.min(w,h)*0.32;
if(type==='e'){
ctx.fillStyle='#C0C0C0';ctx.beginPath();ctx.ellipse(cx,cy,r,r*0.5,0,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.stroke();
ctx.fillStyle='#999';ctx.beginPath();ctx.ellipse(cx,cy,r*0.3,r*0.18,0,0,Math.PI*2);ctx.fill();
if(curCell==='plant'){ctx.fillStyle='#7A9';ctx.beginPath();ctx.ellipse(cx+r*0.4,cy-r*0.2,r*0.12,r*0.08,0.3,0,Math.PI*2);ctx.fill();}
}else if(type==='s'){
var ct=CT.find(function(x){return x.id===curCell});ctx.fillStyle=ct?ct.bg:'#F0E8F5';ctx.fillRect(0,0,w,h);
ctx.fillStyle='#C4B5E0';ctx.beginPath();ctx.ellipse(cx,cy,r,r*0.5,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#7B68AE';ctx.beginPath();ctx.ellipse(cx,cy,r*0.35,r*0.2,0,0,Math.PI*2);ctx.fill();
for(var i=0;i<5;i++){var a=i*Math.PI*2/5;ctx.fillStyle='#D4845A';ctx.beginPath();ctx.arc(cx+Math.cos(a)*r*0.5,cy+Math.sin(a)*r*0.35,r*0.06,0,Math.PI*2);ctx.fill();}
}else{
var cl=CT.find(function(x){return x.id===curCell});ctx.fillStyle=cl?cl.bg:'#F5E6D0';ctx.fillRect(0,0,w,h);
ctx.fillStyle=cl?cl.bg+'88':'#F5E6D0';ctx.beginPath();
if(curCell==='rb'){ctx.ellipse(cx,cy,r,r*0.35,0,0,Math.PI*2);}
else if(curCell==='bac'){ctx.ellipse(cx,cy,r*0.8,r*0.35,0,0,Math.PI*2);}
else{ctx.ellipse(cx,cy,r,r*0.5,0,0,Math.PI*2);}
ctx.fill();ctx.fillStyle='#E8D5C0';ctx.beginPath();ctx.ellipse(cx,cy,r*0.3,r*0.18,0,0,Math.PI*2);ctx.fill();
}}
